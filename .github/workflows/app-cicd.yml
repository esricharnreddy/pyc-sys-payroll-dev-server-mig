  release_prod:
    name: Release to PROD AKS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [publish_prod_acr, release_uat]
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.publish_prod_acr.result == 'success'
      && vars.CONFIGURE_AKS == 'true'
      && needs.release_uat.result != 'failure'
      && needs.release_uat.result != 'cancelled'
    environment: prod
    concurrency: app-release-prod
    env:
      ENVIRONMENT_NAME: prod
      IMAGE: pycpayrollprdeus2acr.azurecr.io/payroll-prd:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
