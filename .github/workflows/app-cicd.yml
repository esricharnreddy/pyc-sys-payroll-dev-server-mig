name: App code build pipeline

on:
  push:
    branches: [ dev ]
    paths:
      - 'Program.cs'
      - 'PayrollApp.csproj'
      - 'appsettings.json'
      - 'global.json'
      - 'Data/**'
      - 'Models/**'
      - 'Pages/**'
      - 'Properties/**'
      - 'Services/**'
      - 'wwwroot/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'k8s/**'
      - '.github/workflows/app-cicd.yml'
  pull_request:
    branches: [ dev ]
    paths:
      - 'Program.cs'
      - 'PayrollApp.csproj'
      - 'appsettings.json'
      - 'global.json'
      - 'Data/**'
      - 'Models/**'
      - 'Pages/**'
      - 'Properties/**'
      - 'Services/**'
      - 'wwwroot/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'k8s/**'
      - '.github/workflows/app-cicd.yml'
  workflow_run:
    workflows: [ "Infrastructure" ]
    types:
      - completed
    branches: [ dev ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: app-code-build-pipeline-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 8.0.x
  IMAGE_ARTIFACT_NAME: payroll-app-image
  IMAGE_TAR: payroll-app-image.tar
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  LOCAL_IMAGE_TAG: payroll-app-build:${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build_app_code_create_docker_image:
    name: Build & Containerize Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore app code
        run: dotnet restore PayrollApp.csproj

      - name: Build app code
        run: dotnet build PayrollApp.csproj --configuration Release --no-restore

      - name: Test app code if test projects exist
        shell: bash
        run: |
          mapfile -t test_projects < <(find . -name '*Test*.csproj' -o -name '*Tests*.csproj')
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No test projects found. Skipping dotnet test."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            dotnet test "$project" --configuration Release
          done

      - name: Create the Docker image
        run: docker build -t "${LOCAL_IMAGE_TAG}" .

      - name: Save Docker image artifact
        run: docker save "${LOCAL_IMAGE_TAG}" -o "${IMAGE_TAR}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 1

      - name: Publish build summary
        run: |
          {
            echo "### Build & Containerize Application"
            echo ""
            echo "- Commit: ${COMMIT_SHA}"
            echo "- Local image: ${LOCAL_IMAGE_TAG}"
            echo "- Artifact: ${IMAGE_ARTIFACT_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish_shared_acr:
    name: Publish Container to Shared ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build_app_code_create_docker_image
    if: github.event_name != 'pull_request'
    environment: dev
    concurrency: app-publish-shared-acr
    env:
      # dev, qa and uat share one registry and one repository, so the image is published once.
      TARGET_ACR_NAME: pycpayrolleus2acr
      TARGET_IMAGE_REPO: pycpayrolleus2acr.azurecr.io/payroll

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}

      - name: Publish the Docker image to the shared ACR
        shell: bash
        run: |
          # Load the image built once and publish it a single time for dev, qa and uat.
          docker load -i "${IMAGE_TAR}"

          image_uri_sha="${TARGET_IMAGE_REPO}:${COMMIT_SHA}"
          image_uri_latest="${TARGET_IMAGE_REPO}:latest"

          az acr login --name "${TARGET_ACR_NAME}"

          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_sha"
          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_latest"
          docker push "$image_uri_sha"
          docker push "$image_uri_latest"

          {
            echo "### Publish Container to Shared ACR"
            echo ""
            echo "- Registry: ${TARGET_ACR_NAME}"
            echo "- Image: $image_uri_sha"
            echo "- Also tagged: latest"
            echo "- Consumed by: dev, qa, uat"
          } >> "$GITHUB_STEP_SUMMARY"

  publish_prod_acr:
    name: Publish Container to Production ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build_app_code_create_docker_image
    if: github.event_name != 'pull_request'
    environment: prod
    concurrency: app-publish-prod-acr
    env:
      # prod uses its own dedicated registry and repository.
      TARGET_ACR_NAME: pycpayrollprdeus2acr
      TARGET_IMAGE_REPO: pycpayrollprdeus2acr.azurecr.io/payroll-prd

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}

      - name: Publish the Docker image to the production ACR
        shell: bash
        run: |
          # Load the image built once and publish it to the dedicated production registry.
          docker load -i "${IMAGE_TAR}"

          image_uri_sha="${TARGET_IMAGE_REPO}:${COMMIT_SHA}"
          image_uri_latest="${TARGET_IMAGE_REPO}:latest"

          az acr login --name "${TARGET_ACR_NAME}"

          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_sha"
          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_latest"
          docker push "$image_uri_sha"
          docker push "$image_uri_latest"

          {
            echo "### Publish Container to Production ACR"
            echo ""
            echo "- Registry: ${TARGET_ACR_NAME}"
            echo "- Image: $image_uri_sha"
            echo "- Also tagged: latest"
            echo "- Consumed by: prod"
          } >> "$GITHUB_STEP_SUMMARY"

  release_dev:
    name: Release to DEV AKS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: publish_shared_acr
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.publish_shared_acr.result == 'success'
      && vars.CONFIGURE_AKS == 'true'
    environment: dev
    concurrency: app-release-dev
    env:
      ENVIRONMENT_NAME: dev
      IMAGE: pycpayrolleus2acr.azurecr.io/payroll:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy the image to AKS
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          SQL_SERVER_NAME: ${{ vars.SQL_SERVER_NAME }}
          SQL_ADMIN_USERNAME: ${{ vars.SQL_ADMIN_USERNAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi
          echo "K8S_NAMESPACE=$K8S_NAMESPACE" >> "$GITHUB_ENV"

          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing
          sudo apt-get update && sudo apt-get install -y gettext-base

          sql_fqdn=""
          if [ -n "$SQL_SERVER_NAME" ]; then
            sql_fqdn="${SQL_SERVER_NAME}.database.windows.net"
          fi
          if [ -z "$sql_fqdn" ]; then
            echo "::error::SQL_SERVER_NAME must be configured for AKS deployment."
            exit 1
          fi
          if [ -z "$SQL_ADMIN_USERNAME" ] || [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::SQL_ADMIN_USERNAME and SQL_ADMIN_PASSWORD must be configured for AKS deployment."
            exit 1
          fi

          envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
          kubectl create secret generic payroll-db -n "$K8S_NAMESPACE" \
            --from-literal=connection-string="Server=tcp:${sql_fqdn},1433;Initial Catalog=PayrollDB;User ID=${SQL_ADMIN_USERNAME};Password=${SQL_ADMIN_PASSWORD};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
            --dry-run=client -o yaml | kubectl apply -f -
          envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
          envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s

      - name: Verify AKS connectivity with DB
        run: |
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s
          # Wait only on the current ReplicaSet's pods so terminating old pods from the rollout are not selected.
          current_rs_hash=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=payroll-app \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.labels.pod-template-hash}')
          kubectl wait --for=condition=ready pod \
            -l "app=payroll-app,pod-template-hash=${current_rs_hash}" \
            -n "$K8S_NAMESPACE" --timeout=180s
          {
            echo "### Release to DEV AKS"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE}"
            echo "- Result: payroll-app pods are Ready. Readiness requires the database health check to pass."
          } >> "$GITHUB_STEP_SUMMARY"

