name: App code build pipeline

on:
  push:
    branches: [ dev ]
    paths:
      - 'Program.cs'
      - 'PayrollApp.csproj'
      - 'appsettings.json'
      - 'global.json'
      - 'Data/**'
      - 'Models/**'
      - 'Pages/**'
      - 'Properties/**'
      - 'Services/**'
      - 'wwwroot/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'k8s/**'
      - '.github/workflows/app-cicd.yml'
  pull_request:
    branches: [ dev ]
    paths:
      - 'Program.cs'
      - 'PayrollApp.csproj'
      - 'appsettings.json'
      - 'global.json'
      - 'Data/**'
      - 'Models/**'
      - 'Pages/**'
      - 'Properties/**'
      - 'Services/**'
      - 'wwwroot/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'k8s/**'
      - '.github/workflows/app-cicd.yml'
  workflow_run:
    workflows: [ "Infrastructure" ]
    types:
      - completed
    branches: [ dev ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: app-code-build-pipeline-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 8.0.x
  IMAGE_ARTIFACT_NAME: payroll-app-image
  IMAGE_TAR: payroll-app-image.tar
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  LOCAL_IMAGE_TAG: payroll-app-build:${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build_app_code_create_docker_image:
    name: Build app code
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore app code
        run: dotnet restore PayrollApp.csproj

      - name: Build app code
        run: dotnet build PayrollApp.csproj --configuration Release --no-restore

      - name: Test app code if test projects exist
        shell: bash
        run: |
          mapfile -t test_projects < <(find . -name '*Test*.csproj' -o -name '*Tests*.csproj')
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No test projects found. Skipping dotnet test."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            dotnet test "$project" --configuration Release
          done

      - name: Create the Docker image
        run: docker build -t "${LOCAL_IMAGE_TAG}" .

      - name: Save Docker image artifact
        run: docker save "${LOCAL_IMAGE_TAG}" -o "${IMAGE_TAR}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 1

      - name: Publish build summary
        run: |
          {
            echo "### Build app code (create the Docker image)"
            echo ""
            echo "- Commit: ${COMMIT_SHA}"
            echo "- Local image: ${LOCAL_IMAGE_TAG}"
            echo "- Artifact: ${IMAGE_ARTIFACT_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  push_acr_dev:
    name: Push the Docker image to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build_app_code_create_docker_image
    if: github.event_name != 'pull_request'
    environment: dev
    concurrency: app-push-dev
    env:
      ENVIRONMENT_NAME: dev
    outputs:
      image_uri_sha: ${{ steps.image.outputs.image_uri_sha }}
      image_uri_latest: ${{ steps.image.outputs.image_uri_latest }}
      k8s_namespace: ${{ steps.image.outputs.k8s_namespace }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}

      - name: Push the Docker image to ACR
        id: image
        shell: bash
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
          IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          # Load the image built once in the "Build app code" stage and reused for every environment.
          docker load -i "${IMAGE_TAR}"

          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR_NAME must be configured for ${ENVIRONMENT_NAME}."
            exit 1
          fi
          if [ -z "$IMAGE_REPOSITORY" ]; then
            echo "::error::IMAGE_REPOSITORY must be configured for ${ENVIRONMENT_NAME}."
            exit 1
          fi
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi

          acr_login_server="$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)"
          image_uri_sha="$acr_login_server/$IMAGE_REPOSITORY:${COMMIT_SHA}"
          image_uri_latest="$acr_login_server/$IMAGE_REPOSITORY:latest"

          echo "image_uri_sha=$image_uri_sha" >> "$GITHUB_OUTPUT"
          echo "image_uri_latest=$image_uri_latest" >> "$GITHUB_OUTPUT"
          echo "k8s_namespace=$K8S_NAMESPACE" >> "$GITHUB_OUTPUT"

          az acr login --name "$ACR_NAME"

          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_sha"
          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_latest"
          docker push "$image_uri_sha"
          docker push "$image_uri_latest"

  deploy_aks_dev:
    name: Deploy the image to AKS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: push_acr_dev
    if: github.event_name != 'pull_request' && needs.push_acr_dev.result == 'success' && vars.CONFIGURE_AKS == 'true'
    environment: dev
    concurrency: app-deploy-dev
    env:
      ENVIRONMENT_NAME: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy the image to AKS
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          IMAGE: ${{ needs.push_acr_dev.outputs.image_uri_sha }}
          K8S_NAMESPACE: ${{ needs.push_acr_dev.outputs.k8s_namespace }}
          SQL_SERVER_NAME: ${{ vars.SQL_SERVER_NAME }}
          SQL_ADMIN_USERNAME: ${{ vars.SQL_ADMIN_USERNAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing
          sudo apt-get update && sudo apt-get install -y gettext-base

          sql_fqdn=""
          if [ -n "$SQL_SERVER_NAME" ]; then
            sql_fqdn="${SQL_SERVER_NAME}.database.windows.net"
          fi
          if [ -z "$sql_fqdn" ]; then
            echo "::error::SQL_SERVER_NAME must be configured for AKS deployment."
            exit 1
          fi
          if [ -z "$SQL_ADMIN_USERNAME" ] || [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::SQL_ADMIN_USERNAME and SQL_ADMIN_PASSWORD must be configured for AKS deployment."
            exit 1
          fi

          envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
          kubectl create secret generic payroll-db -n "$K8S_NAMESPACE" \
            --from-literal=connection-string="Server=tcp:${sql_fqdn},1433;Initial Catalog=PayrollDB;User ID=${SQL_ADMIN_USERNAME};Password=${SQL_ADMIN_PASSWORD};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
            --dry-run=client -o yaml | kubectl apply -f -
          envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
          envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s

  aks_db_dev:
    name: AKS connectivity with DB
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [push_acr_dev, deploy_aks_dev]
    if: github.event_name != 'pull_request' && needs.deploy_aks_dev.result == 'success' && vars.CONFIGURE_AKS == 'true'
    environment: dev
    concurrency: app-connectivity-dev
    env:
      ENVIRONMENT_NAME: dev

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: AKS connectivity with DB
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ needs.push_acr_dev.outputs.k8s_namespace }}
          IMAGE_URI_SHA: ${{ needs.push_acr_dev.outputs.image_uri_sha }}
        run: |
          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s
          # Wait only on the current ReplicaSet's pods so terminating old pods from the rollout are not selected.
          current_rs_hash=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=payroll-app \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.labels.pod-template-hash}')
          kubectl wait --for=condition=ready pod \
            -l "app=payroll-app,pod-template-hash=${current_rs_hash}" \
            -n "$K8S_NAMESPACE" --timeout=180s
          {
            echo "### Deploy to ${ENVIRONMENT_NAME}"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE_URI_SHA}"
            echo "- Result: payroll-app pods are Ready. Readiness requires the database health check to pass."
          } >> "$GITHUB_STEP_SUMMARY"

  push_acr_qa:
    name: Push the Docker image to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: aks_db_dev
    if: github.event_name != 'pull_request' && needs.aks_db_dev.result == 'success'
    environment: qa
    concurrency: app-push-qa
    env:
      ENVIRONMENT_NAME: qa
    outputs:
      image_uri_sha: ${{ steps.image.outputs.image_uri_sha }}
      image_uri_latest: ${{ steps.image.outputs.image_uri_latest }}
      k8s_namespace: ${{ steps.image.outputs.k8s_namespace }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Docker image artifact
