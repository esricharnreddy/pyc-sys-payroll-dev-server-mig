      - name: Deploy the image to AKS
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          IMAGE: ${{ needs.push_acr_qa.outputs.image_uri_sha }}
          K8S_NAMESPACE: ${{ needs.push_acr_qa.outputs.k8s_namespace }}
          SQL_SERVER_NAME: ${{ vars.SQL_SERVER_NAME }}
          SQL_ADMIN_USERNAME: ${{ vars.SQL_ADMIN_USERNAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing
