name: App code build pipeline

on:
  pull_request:
    branches: [ dev ]
    types: [closed]   # ✅ trigger only when PR is closed (merged or not)

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  DOTNET_VERSION: 8.0.x

jobs:

  gitleaks_scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    # ✅ run ONLY if PR is merged
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout merged code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}   # ✅ ensures dev branch code

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        with:
          fail: false   # ✅ do not fail pipeline

      - name: Generate SARIF
        if: always()
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            git --report-format sarif --report-path gitleaks.sarif --redact . || true

      - name: Upload SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Gitleaks Result
        run: echo "::warning::Gitleaks scan completed (non-blocking)"



  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: gitleaks_scan
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout merged code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release



  deploy_dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: build
    if: github.event.pull_request.merged == true

    steps:
      - name: Deploy to DEV
        run: echo "✅ Deploying to DEV after PR merge"
