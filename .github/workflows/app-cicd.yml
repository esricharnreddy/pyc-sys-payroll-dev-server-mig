      - name: Skip AKS deployment when disabled
        if: vars.CONFIGURE_AKS != 'true'
        run: echo "CONFIGURE_AKS is not true. Skipping AKS deployment for ${ENVIRONMENT_NAME}." >> "$GITHUB_STEP_SUMMARY"

      - name: Get AKS credentials
        if: vars.CONFIGURE_AKS == 'true'
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
        run: az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing

      - name: Setup Kubectl
        if: vars.CONFIGURE_AKS == 'true'
        uses: azure/setup-kubectl@v4

      - name: Install manifest tools
        if: vars.CONFIGURE_AKS == 'true'
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Deploy the image to AKS
        if: vars.CONFIGURE_AKS == 'true'
        env:
          IMAGE: ${{ steps.image.outputs.image_uri_sha }}
          K8S_NAMESPACE: ${{ steps.image.outputs.k8s_namespace }}
          SQL_SERVER_NAME: ${{ vars.SQL_SERVER_NAME }}
          SQL_ADMIN_USERNAME: ${{ vars.SQL_ADMIN_USERNAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          sql_fqdn=""
          if [ -n "$SQL_SERVER_NAME" ]; then
            sql_fqdn="${SQL_SERVER_NAME}.database.windows.net"
          fi

          if [ -z "$sql_fqdn" ]; then
            echo "::error::SQL_SERVER_NAME must be configured for AKS deployment."
            exit 1
          fi

          if [ -z "$SQL_ADMIN_USERNAME" ] || [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::SQL_ADMIN_USERNAME and SQL_ADMIN_PASSWORD must be configured for AKS deployment."
            exit 1
          fi

          envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
          kubectl create secret generic payroll-db -n "$K8S_NAMESPACE" \
            --from-literal=connection-string="Server=tcp:${sql_fqdn},1433;Initial Catalog=PayrollDB;User ID=${SQL_ADMIN_USERNAME};Password=${SQL_ADMIN_PASSWORD};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
            --dry-run=client -o yaml | kubectl apply -f -
          envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
          envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s

      - name: AKS connectivity with DB
        if: vars.CONFIGURE_AKS == 'true'
        env:
          K8S_NAMESPACE: ${{ steps.image.outputs.k8s_namespace }}
        run: |
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s
          # Wait only on the current ReplicaSet's pods so terminating old pods from the rollout are not selected.
          current_rs_hash=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=payroll-app \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.labels.pod-template-hash}')
          kubectl wait --for=condition=ready pod \
            -l "app=payroll-app,pod-template-hash=${current_rs_hash}" \
            -n "$K8S_NAMESPACE" --timeout=180s
          {
            echo "### Deploy to ${ENVIRONMENT_NAME}"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${{ steps.image.outputs.image_uri_sha }}"
            echo "- Result: payroll-app pods are Ready. Readiness requires the database health check to pass."
          } >> "$GITHUB_STEP_SUMMARY"
