name: App code build pipeline

on:
  push:
    branches: [ dev, qa, uat, prod ]
    paths:
      - 'Program.cs'
      - 'PayrollApp.csproj'
      - 'PayrollApp.Tests/**'
      - 'appsettings.json'
      - 'global.json'
      - 'Data/**'
      - 'Models/**'
      - 'Pages/**'
      - 'Properties/**'
      - 'Services/**'
      - 'wwwroot/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'k8s/**'
      - '.github/workflows/app-cicd.yml'
  pull_request:
    branches: [ dev, qa, uat, prod ]
    paths:
      - 'Program.cs'
      - 'PayrollApp.csproj'
      - 'PayrollApp.Tests/**'
      - 'appsettings.json'
      - 'global.json'
      - 'Data/**'
      - 'Models/**'
      - 'Pages/**'
      - 'Properties/**'
      - 'Services/**'
      - 'wwwroot/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'k8s/**'
      - '.github/workflows/app-cicd.yml'
  workflow_run:
    workflows: [ "Infrastructure" ]
    types:
      - completed
    branches: [ dev, qa, uat, prod ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

concurrency:
  group: app-code-build-pipeline-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 8.0.x
  IMAGE_ARTIFACT_NAME: payroll-app-image
  IMAGE_TAR: payroll-app-image.tar
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  LOCAL_IMAGE_TAG: payroll-app-build:${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  gitleaks_scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Run Gitleaks action
        id: gitleaks_action
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_SUMMARY: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'

      - name: Generate SARIF report
        id: gitleaks_sarif
        continue-on-error: true
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            git --report-format sarif --report-path gitleaks.sarif --redact .

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Fail on leaked secrets
        if: steps.gitleaks_action.outcome != 'success' || steps.gitleaks_sarif.outcome != 'success'
        run: |
          echo "::error::Gitleaks detected one or more secrets. Review the job summary and SARIF report."
          exit 1

  sonarqube_quality_gate:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: gitleaks_scan
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Decide whether to run SonarQube analysis
        id: sonar_mode
        shell: bash
        run: |
          if [ "${{ github.ref }}" = 'refs/heads/prod' ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore solution for quality checks
        run: dotnet restore PayrollApp.Tests/PayrollApp.Tests.csproj

      - name: Begin SonarQube analysis
        if: steps.sonar_mode.outputs.enabled == 'true'
        shell: bash
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"${{ github.event.repository.name }}" \
            /n:"${{ github.event.repository.name }}" \
            /d:sonar.host.url="${SONAR_HOST_URL}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.qualitygate.timeout=600 \
            /d:sonar.cs.vstest.reportsPaths="TestResults/*.trx"

      - name: Build application and tests
        run: dotnet build PayrollApp.Tests/PayrollApp.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test PayrollApp.Tests/PayrollApp.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=payroll-tests.trx" --results-directory TestResults

      - name: End SonarQube analysis
        if: steps.sonar_mode.outputs.enabled == 'true'
        shell: bash
        run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Publish quality summary
        shell: bash
        run: |
          {
            echo "### SonarQube Quality Gate"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- SonarQube analysis executed: ${{ steps.sonar_mode.outputs.enabled }}"
            echo "- Tests project: PayrollApp.Tests/PayrollApp.Tests.csproj"
            if [ "${{ steps.sonar_mode.outputs.enabled }}" != 'true' ]; then
              echo "- Note: SonarQube Community Edition is intentionally executed only for the prod branch because Community Edition supports a single quality baseline. Gitleaks executes on every branch."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build_app_code_create_docker_image:
    name: Build & Containerize Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - gitleaks_scan
      - sonarqube_quality_gate
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Create the Docker image
        run: docker build -t "${LOCAL_IMAGE_TAG}" .

      - name: Save Docker image artifact
        run: docker save "${LOCAL_IMAGE_TAG}" -o "${IMAGE_TAR}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 1

      - name: Publish build summary
        run: |
          {
            echo "### Build & Containerize Application"
            echo ""
            echo "- Commit: ${COMMIT_SHA}"
            echo "- Local image: ${LOCAL_IMAGE_TAG}"
            echo "- Artifact: ${IMAGE_ARTIFACT_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish_shared_acr:
    name: Publish Container to Shared ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build_app_code_create_docker_image
    if: github.event_name != 'pull_request'
    environment: dev
    concurrency: app-publish-shared-acr
    env:
      # dev, qa and uat share one registry and one repository, so the image is published once.
      TARGET_ACR_NAME: pycpayrolleus2acr
      TARGET_IMAGE_REPO: pycpayrolleus2acr.azurecr.io/payroll

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}

      - name: Publish the Docker image to the shared ACR
        shell: bash
        run: |
          # Load the image built once and publish it a single time for dev, qa and uat.
          docker load -i "${IMAGE_TAR}"

          image_uri_sha="${TARGET_IMAGE_REPO}:${COMMIT_SHA}"
          image_uri_latest="${TARGET_IMAGE_REPO}:latest"

          az acr login --name "${TARGET_ACR_NAME}"

          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_sha"
          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_latest"
          docker push "$image_uri_sha"
          docker push "$image_uri_latest"

          {
            echo "### Publish Container to Shared ACR"
            echo ""
            echo "- Registry: ${TARGET_ACR_NAME}"
            echo "- Image: $image_uri_sha"
            echo "- Also tagged: latest"
            echo "- Consumed by: dev, qa, uat"
          } >> "$GITHUB_STEP_SUMMARY"

  publish_prod_acr:
    name: Publish Container to Production ACR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build_app_code_create_docker_image
    if: github.event_name != 'pull_request'
    environment: prod
    concurrency: app-publish-prod-acr
    env:
      # prod uses its own dedicated registry and repository.
      TARGET_ACR_NAME: pycpayrollprdeus2acr
      TARGET_IMAGE_REPO: pycpayrollprdeus2acr.azurecr.io/payroll-prd

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}

      - name: Publish the Docker image to the production ACR
        shell: bash
        run: |
          # Load the image built once and publish it to the dedicated production registry.
          docker load -i "${IMAGE_TAR}"

          image_uri_sha="${TARGET_IMAGE_REPO}:${COMMIT_SHA}"
          image_uri_latest="${TARGET_IMAGE_REPO}:latest"

          az acr login --name "${TARGET_ACR_NAME}"

          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_sha"
          docker tag "${LOCAL_IMAGE_TAG}" "$image_uri_latest"
          docker push "$image_uri_sha"
          docker push "$image_uri_latest"

          {
            echo "### Publish Container to Production ACR"
            echo ""
            echo "- Registry: ${TARGET_ACR_NAME}"
            echo "- Image: $image_uri_sha"
            echo "- Also tagged: latest"
            echo "- Consumed by: prod"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_dev:
    name: Deploy to DEV AKS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: publish_shared_acr
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.publish_shared_acr.result == 'success'
    environment: dev
    concurrency: app-deploy-dev
    env:
      ENVIRONMENT_NAME: dev
      IMAGE: pycpayrolleus2acr.azurecr.io/payroll:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy the image to AKS
        if: vars.CONFIGURE_AKS == 'true'
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          SQL_SERVER_NAME: ${{ vars.SQL_SERVER_NAME }}
          SQL_ADMIN_USERNAME: ${{ vars.SQL_ADMIN_USERNAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi

          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing
          sudo apt-get update && sudo apt-get install -y gettext-base

          sql_fqdn=""
          if [ -n "$SQL_SERVER_NAME" ]; then
            sql_fqdn="${SQL_SERVER_NAME}.database.windows.net"
          fi
          if [ -z "$sql_fqdn" ]; then
            echo "::error::SQL_SERVER_NAME must be configured for AKS deployment."
            exit 1
          fi
          if [ -z "$SQL_ADMIN_USERNAME" ] || [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::SQL_ADMIN_USERNAME and SQL_ADMIN_PASSWORD must be configured for AKS deployment."
            exit 1
          fi

          envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
          kubectl create secret generic payroll-db -n "$K8S_NAMESPACE" \
            --from-literal=connection-string="Server=tcp:${sql_fqdn},1433;Initial Catalog=PayrollDB;User ID=${SQL_ADMIN_USERNAME};Password=${SQL_ADMIN_PASSWORD};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
            --dry-run=client -o yaml | kubectl apply -f -
          envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
          envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s

          {
            echo "### Deploy to DEV AKS"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE}"
            echo "- Result: Manifests applied and image rolled out to AKS."
          } >> "$GITHUB_STEP_SUMMARY"

  verify_dev:
    name: Verify DEV AKS connectivity with DB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy_dev
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.deploy_dev.result == 'success'
    environment: dev
    concurrency: app-verify-dev
    env:
      ENVIRONMENT_NAME: dev
      IMAGE: pycpayrolleus2acr.azurecr.io/payroll:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify AKS connectivity with DB
        if: vars.CONFIGURE_AKS == 'true'
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi

          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing

          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s
          # Wait only on the current ReplicaSet's pods so terminating old pods from the rollout are not selected.
          current_rs_hash=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=payroll-app \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.labels.pod-template-hash}')
          kubectl wait --for=condition=ready pod \
            -l "app=payroll-app,pod-template-hash=${current_rs_hash}" \
            -n "$K8S_NAMESPACE" --timeout=180s
          {
            echo "### Verify DEV AKS connectivity with DB"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE}"
            echo "- Result: payroll-app pods are Ready. Readiness requires the database health check to pass."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_qa:
    name: Deploy to QA AKS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [publish_shared_acr, deploy_dev, verify_dev]
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.publish_shared_acr.result == 'success'
      && needs.deploy_dev.result == 'success'
      && needs.verify_dev.result != 'failure'
      && needs.verify_dev.result != 'cancelled'
    environment: qa
    concurrency: app-deploy-qa
    env:
      ENVIRONMENT_NAME: qa
      IMAGE: pycpayrolleus2acr.azurecr.io/payroll:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy the image to AKS
        if: vars.CONFIGURE_AKS == 'true'
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          SQL_SERVER_NAME: ${{ vars.SQL_SERVER_NAME }}
          SQL_ADMIN_USERNAME: ${{ vars.SQL_ADMIN_USERNAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi

          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing
          sudo apt-get update && sudo apt-get install -y gettext-base

          sql_fqdn=""
          if [ -n "$SQL_SERVER_NAME" ]; then
            sql_fqdn="${SQL_SERVER_NAME}.database.windows.net"
          fi
          if [ -z "$sql_fqdn" ]; then
            echo "::error::SQL_SERVER_NAME must be configured for AKS deployment."
            exit 1
          fi
          if [ -z "$SQL_ADMIN_USERNAME" ] || [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::SQL_ADMIN_USERNAME and SQL_ADMIN_PASSWORD must be configured for AKS deployment."
            exit 1
          fi

          envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
          kubectl create secret generic payroll-db -n "$K8S_NAMESPACE" \
            --from-literal=connection-string="Server=tcp:${sql_fqdn},1433;Initial Catalog=PayrollDB;User ID=${SQL_ADMIN_USERNAME};Password=${SQL_ADMIN_PASSWORD};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
            --dry-run=client -o yaml | kubectl apply -f -
          envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
          envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s

          {
            echo "### Deploy to QA AKS"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE}"
            echo "- Result: Manifests applied and image rolled out to AKS."
          } >> "$GITHUB_STEP_SUMMARY"

  verify_qa:
    name: Verify QA AKS connectivity with DB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy_qa
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.deploy_qa.result == 'success'
    environment: qa
    concurrency: app-verify-qa
    env:
      ENVIRONMENT_NAME: qa
      IMAGE: pycpayrolleus2acr.azurecr.io/payroll:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify AKS connectivity with DB
        if: vars.CONFIGURE_AKS == 'true'
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi

          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing

          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s
          # Wait only on the current ReplicaSet's pods so terminating old pods from the rollout are not selected.
          current_rs_hash=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=payroll-app \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.labels.pod-template-hash}')
          kubectl wait --for=condition=ready pod \
            -l "app=payroll-app,pod-template-hash=${current_rs_hash}" \
            -n "$K8S_NAMESPACE" --timeout=180s
          {
            echo "### Verify QA AKS connectivity with DB"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE}"
            echo "- Result: payroll-app pods are Ready. Readiness requires the database health check to pass."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_uat:
    name: Deploy to UAT AKS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [publish_shared_acr, deploy_qa, verify_qa]
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.publish_shared_acr.result == 'success'
      && needs.deploy_qa.result == 'success'
      && needs.verify_qa.result != 'failure'
      && needs.verify_qa.result != 'cancelled'
    environment: uat
    concurrency: app-deploy-uat
    env:
      ENVIRONMENT_NAME: uat
      IMAGE: pycpayrolleus2acr.azurecr.io/payroll:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy the image to AKS
        if: vars.CONFIGURE_AKS == 'true'
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          SQL_SERVER_NAME: ${{ vars.SQL_SERVER_NAME }}
          SQL_ADMIN_USERNAME: ${{ vars.SQL_ADMIN_USERNAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi

          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing
          sudo apt-get update && sudo apt-get install -y gettext-base

          sql_fqdn=""
          if [ -n "$SQL_SERVER_NAME" ]; then
            sql_fqdn="${SQL_SERVER_NAME}.database.windows.net"
          fi
          if [ -z "$sql_fqdn" ]; then
            echo "::error::SQL_SERVER_NAME must be configured for AKS deployment."
            exit 1
          fi
          if [ -z "$SQL_ADMIN_USERNAME" ] || [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::SQL_ADMIN_USERNAME and SQL_ADMIN_PASSWORD must be configured for AKS deployment."
            exit 1
          fi

          envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
          kubectl create secret generic payroll-db -n "$K8S_NAMESPACE" \
            --from-literal=connection-string="Server=tcp:${sql_fqdn},1433;Initial Catalog=PayrollDB;User ID=${SQL_ADMIN_USERNAME};Password=${SQL_ADMIN_PASSWORD};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
            --dry-run=client -o yaml | kubectl apply -f -
          envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
          envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s

          {
            echo "### Deploy to UAT AKS"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE}"
            echo "- Result: Manifests applied and image rolled out to AKS."
          } >> "$GITHUB_STEP_SUMMARY"

  verify_uat:
    name: Verify UAT AKS connectivity with DB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy_uat
    if: >-
      always()
      && github.event_name != 'pull_request'
      && needs.deploy_uat.result == 'success'
    environment: uat
    concurrency: app-verify-uat
    env:
      ENVIRONMENT_NAME: uat
      IMAGE: pycpayrolleus2acr.azurecr.io/payroll:${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify AKS connectivity with DB
        if: vars.CONFIGURE_AKS == 'true'
        env:
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          if [ -z "$K8S_NAMESPACE" ]; then
            K8S_NAMESPACE="payroll-${ENVIRONMENT_NAME}"
          fi

          az aks get-credentials --name "$AKS_CLUSTER_NAME" --resource-group "$AKS_RESOURCE_GROUP" --overwrite-existing

          kubectl rollout status deployment/payroll-app -n "$K8S_NAMESPACE" --timeout=180s
          # Wait only on the current ReplicaSet's pods so terminating old pods from the rollout are not selected.
          current_rs_hash=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=payroll-app \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.labels.pod-template-hash}')
          kubectl wait --for=condition=ready pod \
            -l "app=payroll-app,pod-template-hash=${current_rs_hash}" \
            -n "$K8S_NAMESPACE" --timeout=180s
          {
            echo "### Verify UAT AKS connectivity with DB"
            echo ""
            echo "- Namespace: ${K8S_NAMESPACE}"
            echo "- Image: ${IMAGE}"
            echo "- Result: payroll-app pods are Ready. Readiness requires the database health check to pass."
          } >> "$GITHUB_STEP_SUMMARY"

