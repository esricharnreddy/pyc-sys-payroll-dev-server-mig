name: App code build pipeline

on:
  push:
    branches: [ dev, qa, uat, prod ]
  pull_request:
    branches: [ dev, qa, uat, prod ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  DOTNET_VERSION: 8.0.x

jobs:
  gitleaks_scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        with:
          fail: false   # ✅ KEY override
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SARIF
        if: always()
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            git --report-format sarif --report-path gitleaks.sarif --redact . || true

      - name: Upload SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Gitleaks Result (Non-blocking)
        if: always()
        run: |
          echo "::warning::Gitleaks scan completed. Not failing pipeline."

  sonarqube_quality_gate:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: gitleaks_scan

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: sonarqube_quality_gate

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t app:latest .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy step
        run: echo "Deploying application..."
