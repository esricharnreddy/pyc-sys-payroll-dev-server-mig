        IMAGE_URI_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG_SHA"
        IMAGE_URI_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:latest"

        docker build -t "$IMAGE_URI_SHA" -t "$IMAGE_URI_LATEST" .
        docker push "$IMAGE_URI_SHA"
        docker push "$IMAGE_URI_LATEST"

    - name: Publish Image Metadata
      env:
        ACR_LOGIN_SERVER: ${{ steps.tf_outputs.outputs.acr_login_server }}
        IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
        IMAGE_TAG_SHA: ${{ github.sha }}
      run: |
        IMAGE_URI_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG_SHA"
        IMAGE_URI_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:latest"
        {
          echo "### prod image"
          echo ""
          echo "- ACR: ${{ steps.tf_outputs.outputs.acr_name }}"
          echo "- Repository: $IMAGE_REPOSITORY"
          echo "- SHA tag: $IMAGE_URI_SHA"
          echo "- Latest tag: $IMAGE_URI_LATEST"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Read SQL FQDN
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      id: sql
      working-directory: infra/terraform
      run: echo "fqdn=$(terraform output -raw sql_server_fqdn)" >> "$GITHUB_OUTPUT"

    - name: Get AKS Credentials
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      run: az aks get-credentials --name "${{ vars.AKS_CLUSTER_NAME }}" --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" --overwrite-existing

    - name: Setup Kubectl
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      uses: azure/setup-kubectl@v4

    - name: Install Manifest Tools
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      run: sudo apt-get update && sudo apt-get install -y gettext-base

    - name: Deploy to AKS
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      env:
        ACR_LOGIN_SERVER: ${{ steps.tf_outputs.outputs.acr_login_server }}
        IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
        IMAGE_TAG_SHA: ${{ github.sha }}
        K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'payroll-prod' }}
        SQL_FQDN: ${{ steps.sql.outputs.fqdn }}
      run: |
        export IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${IMAGE_TAG_SHA}"
        envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
        kubectl create secret generic payroll-db -n "${K8S_NAMESPACE}" \
          --from-literal=connection-string="Server=tcp:${SQL_FQDN},1433;Initial Catalog=PayrollDB;User ID=${{ vars.SQL_ADMIN_USERNAME }};Password=${{ secrets.SQL_ADMIN_PASSWORD }};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
          --dry-run=client -o yaml | kubectl apply -f -
        envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
        envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
        kubectl rollout status deployment/payroll-app -n "${K8S_NAMESPACE}" --timeout=180s