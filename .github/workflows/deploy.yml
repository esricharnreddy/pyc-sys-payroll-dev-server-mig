name: Sequential Environment ACR Deployment

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: infra/terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.8

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Init Without Backend
      run: terraform init -backend=false

    - name: Terraform Validate
      run: terraform validate

  deploy_dev:
    name: Deploy dev Infra and Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: dev
    concurrency: payroll-dev

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_create_sql: ${{ vars.CREATE_SQL || 'false' }}
      TF_VAR_sql_server_name: ${{ vars.SQL_SERVER_NAME }}
      TF_VAR_sql_admin_username: ${{ vars.SQL_ADMIN_USERNAME }}
      TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
      TF_VAR_configure_aks: ${{ vars.CONFIGURE_AKS || 'false' }}
      TF_VAR_aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
      TF_VAR_aks_resource_group_name: ${{ vars.AKS_RESOURCE_GROUP }}
      TF_VAR_grant_aks_acr_pull: ${{ vars.GRANT_AKS_ACR_PULL || 'true' }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.8

    - name: Terraform Format Check
      working-directory: infra/terraform
      run: terraform fmt -check -recursive

    - name: Terraform Init
      working-directory: infra/terraform
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
          -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
          -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
          -backend-config="key=${{ vars.TF_STATE_KEY }}"

    - name: Terraform Validate
      working-directory: infra/terraform
      run: terraform validate

    - name: Terraform Plan
      working-directory: infra/terraform
      run: |
        terraform plan \
          -input=false \
          -out=tfplan \
          -var="location=${{ vars.AZURE_LOCATION }}" \
          -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME }}" \
          -var="create_resource_group=${{ vars.CREATE_RESOURCE_GROUP }}" \
          -var="acr_name=${{ vars.ACR_NAME }}" \
          -var="acr_resource_group_name=${{ vars.ACR_RESOURCE_GROUP_NAME }}" \
          -var="create_acr=${{ vars.CREATE_ACR }}"

    - name: Terraform Apply
      working-directory: infra/terraform
      run: terraform apply -input=false -auto-approve tfplan

    - name: Read Terraform Outputs
      id: tf_outputs
      working-directory: infra/terraform
      run: |
        echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
        echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

    - name: ACR Login
      run: az acr login --name "${{ steps.tf_outputs.outputs.acr_name }}"

    - name: Build and Push Docker Image
      env:
        ACR_LOGIN_SERVER: ${{ steps.tf_outputs.outputs.acr_login_server }}
        IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
        IMAGE_TAG_SHA: ${{ github.sha }}
      run: |
        IMAGE_URI_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG_SHA"
        IMAGE_URI_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:latest"

        docker build -t "$IMAGE_URI_SHA" -t "$IMAGE_URI_LATEST" .
        docker push "$IMAGE_URI_SHA"
        docker push "$IMAGE_URI_LATEST"

    - name: Publish Image Metadata
      env:
        ACR_LOGIN_SERVER: ${{ steps.tf_outputs.outputs.acr_login_server }}
        IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
        IMAGE_TAG_SHA: ${{ github.sha }}
      run: |
        IMAGE_URI_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG_SHA"
        IMAGE_URI_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:latest"
        {
          echo "### dev image"
          echo ""
          echo "- ACR: ${{ steps.tf_outputs.outputs.acr_name }}"
          echo "- Repository: $IMAGE_REPOSITORY"
          echo "- SHA tag: $IMAGE_URI_SHA"
          echo "- Latest tag: $IMAGE_URI_LATEST"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Read SQL FQDN
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      id: sql
      working-directory: infra/terraform
      run: echo "fqdn=$(terraform output -raw sql_server_fqdn)" >> "$GITHUB_OUTPUT"

    - name: Get AKS Credentials
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      run: az aks get-credentials --name "${{ vars.AKS_CLUSTER_NAME }}" --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" --overwrite-existing

    - name: Setup Kubectl
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      uses: azure/setup-kubectl@v4

    - name: Install Manifest Tools
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      run: sudo apt-get update && sudo apt-get install -y gettext-base

    - name: Deploy to AKS
      if: ${{ vars.CONFIGURE_AKS == 'true' }}
      env:
        ACR_LOGIN_SERVER: ${{ steps.tf_outputs.outputs.acr_login_server }}
        IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
        IMAGE_TAG_SHA: ${{ github.sha }}
        K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'payroll-dev' }}
        SQL_FQDN: ${{ steps.sql.outputs.fqdn }}
      run: |
        export IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${IMAGE_TAG_SHA}"
        envsubst '${K8S_NAMESPACE}' < k8s/namespace.yaml | kubectl apply -f -
        kubectl create secret generic payroll-db -n "${K8S_NAMESPACE}" \
          --from-literal=connection-string="Server=tcp:${SQL_FQDN},1433;Initial Catalog=PayrollDB;User ID=${{ vars.SQL_ADMIN_USERNAME }};Password=${{ secrets.SQL_ADMIN_PASSWORD }};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;" \
          --dry-run=client -o yaml | kubectl apply -f -
        envsubst '${K8S_NAMESPACE}' < k8s/service.yaml | kubectl apply -f -
        envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
        kubectl rollout status deployment/payroll-app -n "${K8S_NAMESPACE}" --timeout=180s

