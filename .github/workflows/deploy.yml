name: Sequential Environment ACR Deployment

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: infra/terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.8

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Init Without Backend
      run: terraform init -backend=false

    - name: Terraform Validate
      run: terraform validate

  deploy_dev:
    name: Deploy dev Infra and Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: dev
    concurrency: payroll-dev

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.8

    - name: Terraform Format Check
      working-directory: infra/terraform
      run: terraform fmt -check -recursive

    - name: Terraform Init
      working-directory: infra/terraform
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
          -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
          -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
          -backend-config="key=${{ vars.TF_STATE_KEY }}"

    - name: Terraform Validate
      working-directory: infra/terraform
      run: terraform validate

    - name: Terraform Plan
      working-directory: infra/terraform
      run: |
        terraform plan \
          -input=false \
          -out=tfplan \
          -var="location=${{ vars.AZURE_LOCATION }}" \
          -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME }}" \
          -var="create_resource_group=${{ vars.CREATE_RESOURCE_GROUP }}" \
          -var="acr_name=${{ vars.ACR_NAME }}" \
          -var="acr_resource_group_name=${{ vars.ACR_RESOURCE_GROUP_NAME }}" \
          -var="create_acr=${{ vars.CREATE_ACR }}"

    - name: Terraform Apply
      working-directory: infra/terraform
      run: terraform apply -input=false -auto-approve tfplan

    - name: Read Terraform Outputs
      id: tf_outputs
      working-directory: infra/terraform
      run: |
        echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
        echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

    - name: ACR Login
      run: az acr login --name "${{ steps.tf_outputs.outputs.acr_name }}"

    - name: Build and Push Docker Image
      env:
        ACR_LOGIN_SERVER: ${{ steps.tf_outputs.outputs.acr_login_server }}
        IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
        IMAGE_TAG_SHA: ${{ github.sha }}
      run: |
        IMAGE_URI_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG_SHA"
        IMAGE_URI_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:latest"

        docker build -t "$IMAGE_URI_SHA" -t "$IMAGE_URI_LATEST" .
        docker push "$IMAGE_URI_SHA"
        docker push "$IMAGE_URI_LATEST"

    - name: Publish Image Metadata
      env:
        ACR_LOGIN_SERVER: ${{ steps.tf_outputs.outputs.acr_login_server }}
        IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
        IMAGE_TAG_SHA: ${{ github.sha }}
      run: |
        IMAGE_URI_SHA="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG_SHA"
        IMAGE_URI_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:latest"
        {
          echo "### dev image"
          echo ""
          echo "- ACR: ${{ steps.tf_outputs.outputs.acr_name }}"
          echo "- Repository: $IMAGE_REPOSITORY"
          echo "- SHA tag: $IMAGE_URI_SHA"
          echo "- Latest tag: $IMAGE_URI_LATEST"
        } >> "$GITHUB_STEP_SUMMARY"

