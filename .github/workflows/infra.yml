          fi

          kubelet_principal_id="$(az aks show --name "$AKS_CLUSTER_NAME" --resource-group "$aks_resource_group" --query identityProfile.kubeletidentity.objectId -o tsv 2>/dev/null || true)"
          if [ -z "$kubelet_principal_id" ]; then
            echo "AKS kubelet identity was not found. Skipping AcrPull import."
            exit 0
          fi

          assignment_id="$(az role assignment list --scope "$acr_id" --assignee "$kubelet_principal_id" --role AcrPull --query '[0].id' -o tsv 2>/dev/null || true)"
          if [ -z "$assignment_id" ]; then
            echo "No existing AcrPull assignment found. Terraform will create it if needed."
            exit 0
          fi

          if terraform state show 'azurerm_role_assignment.aks_acr_pull[0]' >/dev/null 2>&1; then
            echo "AcrPull role assignment is already managed by Terraform state."
            exit 0
          fi

          terraform import -input=false 'azurerm_role_assignment.aks_acr_pull[0]' "$assignment_id"

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -lock-timeout=300s \
            -target=azurerm_role_assignment.aks_acr_pull \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME }}" \
            -var="create_resource_group=${{ vars.CREATE_RESOURCE_GROUP || 'false' }}" \
