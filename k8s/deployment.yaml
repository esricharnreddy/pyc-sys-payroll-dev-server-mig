apiVersion: apps/v1
kind: Deployment
metadata:
  name: payroll-app
  namespace: ${K8S_NAMESPACE}
  labels:
    app: payroll-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payroll-app
  template:
    metadata:
      labels:
        app: payroll-app
    spec:
      containers:
        - name: payroll-app
          # Image is substituted at deploy time via envsubst, e.g.
          #   IMAGE=<acr>.azurecr.io/<repo>:<sha> K8S_NAMESPACE=payroll-dev envsubst '${IMAGE} ${K8S_NAMESPACE}' < k8s/deployment.yaml | kubectl apply -f -
          image: ${IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            # Connection string comes from a Secret created at deploy time.
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: payroll-db
                  key: connection-string
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
