# Azure DevOps Pipeline for Payroll App with Database Migrations

trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildJob
        displayName: 'Build and Test'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              version: $(dotnetVersion)
              includePreviewVersions: false

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build Application'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Publish Application'
            inputs:
              command: 'publish'
              publishWebProjects: true
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'
              publishLocation: 'Container'

  - stage: DatabaseMigration
    displayName: 'Database Migration'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDatabase
        displayName: 'Apply EF Core Migrations'
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: UseDotNet@2
                  displayName: 'Install .NET SDK'
                  inputs:
                    version: $(dotnetVersion)

                - task: DownloadBuildArtifacts@1
                  displayName: 'Download Artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: PowerShell@2
                  displayName: 'Install EF Core Tools'
                  inputs:
                    targetType: 'inline'
                    script: |
                      dotnet tool install --global dotnet-ef --version 8.0.0

                - task: PowerShell@2
                  displayName: 'Apply Database Migrations'
                  inputs:
                    targetType: 'inline'
                    script: |
                      cd "$(System.DefaultWorkingDirectory)"
                      dotnet ef database update --connection "$(ConnectionStrings.DefaultConnection)"
                  env:
                    ConnectionStrings__DefaultConnection: $(AzureSqlConnectionString)

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: DatabaseMigration
    condition: succeeded()
    jobs:
      - deployment: DeployWeb
        displayName: 'Deploy Web App'
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure App Service'
                  inputs:
                    azureSubscription: '$(AzureSubscription)'
                    appType: 'webApp'
                    appName: '$(WebAppName)'
                    package: '$(Pipeline.Workspace)/drop/**/*.zip'
                    deploymentMethod: 'auto'

# Variables to configure in Azure DevOps:
# - AzureSubscription: Your Azure service connection
# - WebAppName: Name of your Azure App Service
# - AzureSqlConnectionString: Connection string to Azure SQL Database
